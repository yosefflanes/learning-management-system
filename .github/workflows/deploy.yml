# Build the Next.js static export and deploy it to GitHub Pages.
# Repo: yosefflanes/learning-management-system  →  https://github.com/yosefflanes/learning-management-system/
#
# One-time repo setup (Settings → Pages):
#   "Build and deployment" → Source: **GitHub Actions**
#
# Relies on next.config.ts keeping:
#   output: "export"                 # static export → ./out
#   basePath: "/learning-management-system"    # must match the repo name / Pages URL
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write # required by actions/deploy-pages (OIDC)

# Only one deployment at a time; cancel any in-flight run on new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
